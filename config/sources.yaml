# Aakh — sources config
# Edit this file to control what gets pulled each night.
# No code changes needed.

github:
  # Repos created/starred in the last N days to consider
  since_days: 1
  # Languages you care about — repos outside these are deprioritised
  languages:
    - python
    - javascript
    - typescript
    - rust
    - go
  # Minimum stars to include a repo
  min_stars: 50
  # How many repos to fetch per language
  per_language: 5

competitions:
  sources:
    - name: Devpost
      url: https://devpost.com/hackathons?open_to=public&order_by=deadline
    - name: MLH
      url: https://mlh.io/seasons/2025/events
  # Only include competitions with deadlines more than N days away
  min_days_remaining: 3

hackernews:
  rss_url: https://hnrss.org/frontpage
  # How many top stories to pull
  limit: 20
  # Filter — only include stories whose titles contain at least one of these terms
  # Leave empty [] to include all top stories
  keywords:
    - python
    - javascript
    - rust
    - open source
    - AI
    - ML
    - research
    - tool
    - database
    - compiler
    - linux
    - security
    - LLM
    - startup

activity:
  # Path to the editable digest file (local machine only, never committed)
  digest_path: "activity_today.md"
  # Fallback prompt if digest is empty or missing
  fallback_prompt: >
    No activity digest found for today. Rank based on general
    student interest in software development and CS research.
