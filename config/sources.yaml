# Aakh — sources config
# Edit this file to control what gets pulled each night.
# No code changes needed.

github:
  # Repos created in the last N days to consider
  since_days: 7
  # Languages you care about
  languages:
    - python
    - javascript
    - typescript
    - rust
    - go
    - c
    - cpp
    - java
  # Minimum stars to include a repo
  min_stars: 20
  # How many repos to fetch per language
  per_language: 8

competitions:
  sources:
    - name: Devpost
      url: https://devpost.com/hackathons?open_to=public&order_by=deadline
    - name: MLH
      url: https://mlh.io/seasons/2025/events
  min_days_remaining: 3

hackernews:
  rss_url: https://hnrss.org/frontpage
  limit: 20
  keywords:
    - python
    - javascript
    - rust
    - open source
    - AI
    - ML
    - research
    - tool
    - database
    - compiler
    - linux
    - security
    - LLM
    - startup

activity:
  digest_path: "activity_today.md"
  fallback_prompt: >
    No activity digest found for today. Rank based on general
    student interest in software development and CS research.
