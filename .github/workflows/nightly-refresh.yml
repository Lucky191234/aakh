name: Nightly Refresh

on:
  schedule:
    # 4:30 AM IST = 23:00 UTC
    - cron: "0 23 * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch GitHub trending repos
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python scripts/fetch_github_trending.py

      - name: Fetch competitions
        run: python scripts/fetch_competitions.py

      - name: Fetch Hacker News RSS
        run: python scripts/fetch_hackernews_rss.py

      - name: Rank hot topics with LLM
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python scripts/rank_hot_topics.py

      - name: Build final dashboard data
        run: python scripts/build_dashboard_data.py

      - name: Generate morning audio
        run: python scripts/generate_audio.py

      - name: Copy data and audio into docs for GitHub Pages
        run: |
          mkdir -p docs/data docs/audio
          cp data/data.json docs/data/data.json
          [ -f docs/audio/morning.mp3 ] && echo "audio ready" || echo "no audio generated"

      - name: Commit updated data
        run: |
          git config user.name "aakh-bot"
          git config user.email "aakh-bot@users.noreply.github.com"
          git add data/ docs/data/ docs/audio/ data/data_history.json || true
          git diff --cached --quiet || git commit -m "chore: nightly refresh $(date -u +'%Y-%m-%d')"
          git push

      # Only runs when something above fails
      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Aakh nightly refresh failed on $(date -u +'%Y-%m-%d')"
          echo "::error::Check the steps above for which script failed."
          echo "Go to: https://github.com/${{ github.repository }}/actions"
